name: build

on:
  push:
    branches-ignore:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install packaging tools
        run: brew install ldid dpkg xz

      - name: Install Theos
        run: |
          set -euo pipefail
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git "$THEOS"
          echo "THEOS=$THEOS" >> "$GITHUB_ENV"

      - name: Install iOS SDK (patched, includes PrivateFrameworks)
        run: |
          set -euo pipefail
          # Xcode's public SDK has no Preferences.framework; pull one patched SDK.
          # theos already ships an (empty) sdks dir, so clone to a temp and move in.
          TMP=$(mktemp -d)
          git clone -n --depth=1 --filter=tree:0 https://github.com/theos/sdks "$TMP/sdks"
          cd "$TMP/sdks"
          git sparse-checkout set --no-cone iPhoneOS16.5.sdk
          git checkout
          mkdir -p "$THEOS/sdks"
          mv iPhoneOS16.5.sdk "$THEOS/sdks/"
          ls -d "$THEOS/sdks/"*/ | head

      - name: Build package
        run: |
          set -euo pipefail
          BUILD="${{ github.run_number }}"
          /usr/bin/sed -i '' "s/^Version: 0.1-dev$/Version: 0.1-dev.$BUILD/" control
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" prefs/Resources/Info.plist
          make clean || true
          make package FINALPACKAGE=1

      - name: Show built Mach-O arch (arm64e ABI sanity)
        run: |
          set -euo pipefail
          BUNDLE_BIN=$(find . -path '*ProxySwitcherNG.bundle/ProxySwitcherNG' -type f | head -1)
          echo "bundle bin: $BUNDLE_BIN"
          otool -hv "$BUNDLE_BIN" || true
          lipo -detailed_info "$BUNDLE_BIN" || true
          # Regression gate for issue #1: the bundle must be fat with an arm64
          # slice (A11 and older: iPhone 8/X) AND an arm64e slice carrying Apple's
          # ptrauth ABI (caps USR00, cpusubtype 0x80000002) for A12+.
          ARCHS="$(lipo -archs "$BUNDLE_BIN")"
          echo "archs: $ARCHS"
          case " $ARCHS " in *" arm64 "*) ;; *) echo "MISSING arm64 slice (A11 devices will fail to load)"; exit 1 ;; esac
          case " $ARCHS " in *" arm64e "*) ;; *) echo "MISSING arm64e slice"; exit 1 ;; esac
          otool -hv "$BUNDLE_BIN" | grep -q '0x80000002\|USR00' || { echo "arm64e slice lacks ptrauth ABI (caps USR00)"; exit 1; }
          echo "OK: fat bundle with arm64 + arm64e (ptrauth) slices"

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: proxyswitcherng-deb
          path: packages/*.deb
          if-no-files-found: error
